name: microlock
description: "Flutter client for the Microlock ESP32 smart lock."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo_trim.png
    - assets/icon.png

flutter_launcher_icons:
  android: true
  min_sdk_android: 21
  image_path: assets/app_icon_legacy.png
  adaptive_icon_foreground: assets/app_icon_fg.png
  adaptive_icon_background: "#000000"
